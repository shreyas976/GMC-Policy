<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GMC Policy Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    .card {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <h1>🏥 GMC Policy Portal</h1>
  <p>All your medical coverage details in one place</p>
</header>

<div class="container">

  <div class="card">
    <h2>Overview</h2>
    <p>This page contains complete details of your Group Medical Coverage policy.</p>
  </div>

  <div class="card">
    <h2>Coverage</h2>
    <ul>
      <li>Employee</li>
      <li>Spouse</li>
      <li>Children</li>
    </ul>
  </div>

  <div class="card">
    <h2>Benefits</h2>
    <ul>
      <li>Hospitalization</li>
      <li>Pre & Post hospitalization</li>
      <li>Daycare procedures</li>
    </ul>
  </div>

</div>

</body>
</html>
